
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: var(--font-sans); }
#app { background: #f5f4f0; min-height: 100vh; padding: 24px 16px; }
.title { font-size: 18px; font-weight: 500; color: var(--color-text-primary); text-align: center; margin-bottom: 4px; }
.subtitle { font-size: 13px; color: var(--color-text-secondary); text-align: center; margin-bottom: 20px; }
.input-card { background: #fff; border: 0.5px solid var(--color-border-tertiary); border-radius: 12px; padding: 16px; margin-bottom: 20px; }
.input-label { font-size: 12px; color: var(--color-text-secondary); margin-bottom: 8px; letter-spacing: 0.04em; text-transform: uppercase; }
#code-input { width: 100%; border: 0.5px solid var(--color-border-secondary); border-radius: 8px; padding: 10px 12px; font-family: var(--font-mono); font-size: 14px; color: var(--color-text-primary); background: #faf9f6; resize: none; height: 60px; outline: none; }
#code-input:focus { border-color: #534AB7; }
.pipeline { display: flex; align-items: center; gap: 0; margin-bottom: 20px; overflow-x: auto; padding-bottom: 4px; }
.phase-pill { flex: 1; min-width: 80px; display: flex; flex-direction: column; align-items: center; position: relative; cursor: pointer; }
.phase-pill .dot { width: 36px; height: 36px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 14px; border: 2px solid transparent; transition: all 0.3s; position: relative; z-index: 1; }
.phase-pill .plabel { font-size: 10px; margin-top: 5px; text-align: center; color: var(--color-text-secondary); transition: color 0.3s; line-height: 1.3; }
.phase-pill.done .dot { background: #534AB7; border-color: #534AB7; color: #fff; }
.phase-pill.done .plabel { color: #534AB7; font-weight: 500; }
.phase-pill.active .dot { background: #fff; border-color: #534AB7; color: #534AB7; box-shadow: 0 0 0 4px #EEEDFE; animation: pulseDot 1.4s ease-in-out infinite; }
.phase-pill.active .plabel { color: #534AB7; font-weight: 500; }
.phase-pill.pending .dot { background: #fff; border-color: var(--color-border-secondary); color: var(--color-text-secondary); }
@keyframes pulseDot { 0%,100%{box-shadow:0 0 0 4px #EEEDFE} 50%{box-shadow:0 0 0 8px #EEEDFE} }
.connector { flex: 0 0 16px; height: 2px; background: var(--color-border-secondary); transition: background 0.4s; margin-bottom: 22px; }
.connector.lit { background: #534AB7; }
.progress-bar-wrap { background: var(--color-border-tertiary); border-radius: 99px; height: 4px; margin-bottom: 20px; }
.progress-bar-fill { height: 4px; border-radius: 99px; background: linear-gradient(90deg, #534AB7, #AFA9EC); transition: width 0.5s cubic-bezier(.4,0,.2,1); }
.phase-card { background: #fff; border: 0.5px solid var(--color-border-tertiary); border-radius: 12px; overflow: hidden; min-height: 300px; position: relative; }
.phase-header { padding: 16px 20px 12px; display: flex; align-items: flex-start; gap: 12px; border-bottom: 0.5px solid var(--color-border-tertiary); }
.phase-icon { width: 40px; height: 40px; border-radius: 10px; display: flex; align-items: center; justify-content: center; font-size: 18px; flex-shrink: 0; }
.phase-title-wrap { flex: 1; }
.phase-num { font-size: 10px; text-transform: uppercase; letter-spacing: 0.06em; color: var(--color-text-secondary); margin-bottom: 2px; }
.phase-name { font-size: 16px; font-weight: 500; color: var(--color-text-primary); }
.phase-desc { font-size: 12px; color: var(--color-text-secondary); margin-top: 2px; line-height: 1.5; }
.phase-body { padding: 20px; }
.vis-area { font-family: var(--font-mono); font-size: 13px; }
.token-row { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 12px; }
.token { padding: 4px 10px; border-radius: 6px; font-size: 12px; font-family: var(--font-mono); font-weight: 500; animation: popIn 0.3s ease backwards; }
@keyframes popIn { from{opacity:0;transform:scale(0.7)} to{opacity:1;transform:scale(1)} }
.tok-kw { background: #EEEDFE; color: #3C3489; }
.tok-id { background: #E1F5EE; color: #085041; }
.tok-op { background: #FAEEDA; color: #633806; }
.tok-num { background: #FAECE7; color: #4A1B0C; }
.tok-punct { background: #F1EFE8; color: #2C2C2A; }
.tok-label { font-size: 10px; color: var(--color-text-secondary); margin-top: 3px; text-align: center; }
.tree-node { display: flex; flex-direction: column; align-items: center; }
.tree-box { padding: 6px 14px; border-radius: 8px; font-size: 13px; font-family: var(--font-mono); background: #EEEDFE; color: #3C3489; border: 0.5px solid #AFA9EC; white-space: nowrap; animation: fadeSlide 0.4s ease backwards; }
@keyframes fadeSlide { from{opacity:0;transform:translateY(-10px)} to{opacity:1;transform:translateY(0)} }
.tree-branch { display: flex; align-items: flex-start; gap: 32px; margin-top: 12px; position: relative; }
.tree-branch::before { content:''; position:absolute; top:-6px; left:50%; transform:translateX(-50%); width:2px; height:12px; background: #AFA9EC; }
.tree-child { display: flex; flex-direction: column; align-items: center; }
.tree-v-line { width: 2px; height: 16px; background: #AFA9EC; }
.tree-h-bar { position: relative; display: flex; justify-content: center; width: 100%; }
.code-block { background: #faf9f6; border: 0.5px solid var(--color-border-tertiary); border-radius: 8px; padding: 14px 16px; font-family: var(--font-mono); font-size: 13px; line-height: 1.8; color: var(--color-text-primary); }
.code-line { display: flex; align-items: center; gap: 12px; animation: fadeSlide 0.35s ease backwards; }
.line-num { font-size: 11px; color: var(--color-text-secondary); min-width: 16px; }
.hl-var { color: #185FA5; }
.hl-num { color: #993C1D; }
.hl-op { color: #633806; }
.hl-kw { color: #533AB7; }
.badge { display: inline-flex; align-items: center; gap: 5px; padding: 5px 12px; border-radius: 99px; font-size: 12px; font-weight: 500; }
.badge-ok { background: #EAF3DE; color: #27500A; }
.badge-err { background: #FCEBEB; color: #501313; }
.semantic-row { display: flex; align-items: center; gap: 10px; margin: 8px 0; font-size: 13px; }
.sem-check { width: 18px; height: 18px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 10px; flex-shrink: 0; }
.sem-ok { background: #EAF3DE; color: #27500A; }
.asm-line { display: flex; gap: 12px; align-items: center; padding: 4px 0; animation: slideR 0.35s ease backwards; }
@keyframes slideR { from{opacity:0;transform:translateX(-16px)} to{opacity:1;transform:translateX(0)} }
.asm-instr { color: #185FA5; font-weight: 500; min-width: 56px; }
.asm-args { color: var(--color-text-primary); }
.asm-comment { color: var(--color-text-secondary); font-size: 11px; margin-left: auto; }
.reg-viz { display: flex; gap: 10px; margin-top: 14px; flex-wrap: wrap; }
.reg-box { border: 1px solid var(--color-border-secondary); border-radius: 8px; padding: 8px 14px; text-align: center; }
.reg-name { font-size: 10px; color: var(--color-text-secondary); text-transform: uppercase; letter-spacing: 0.06em; }
.reg-val { font-size: 16px; font-weight: 500; color: #185FA5; font-family: var(--font-mono); }
.controls { display: flex; gap: 10px; margin-top: 16px; align-items: center; }
.btn-primary { background: #534AB7; color: #fff; border: none; border-radius: 8px; padding: 10px 22px; font-size: 14px; font-weight: 500; cursor: pointer; transition: background 0.2s, transform 0.1s; }
.btn-primary:hover { background: #3C3489; }
.btn-primary:active { transform: scale(0.97); }
.btn-primary:disabled { background: var(--color-border-secondary); cursor: default; }
.btn-reset { background: transparent; color: var(--color-text-secondary); border: 0.5px solid var(--color-border-secondary); border-radius: 8px; padding: 10px 18px; font-size: 14px; cursor: pointer; transition: all 0.2s; }
.btn-reset:hover { background: var(--color-background-secondary); color: var(--color-text-primary); }
.phase-tag { margin-left: auto; font-size: 11px; color: var(--color-text-secondary); }
.tooltip-row { background: #EEEDFE; border-radius: 8px; padding: 10px 14px; font-size: 12px; color: #3C3489; margin-bottom: 12px; line-height: 1.5; }
.scan-anim { position: relative; overflow: hidden; }
.scan-line { position: absolute; top: 0; left: -4px; width: 3px; height: 100%; background: #534AB7; opacity: 0.5; border-radius: 2px; animation: scanMove 1.4s ease-in-out 1; }
@keyframes scanMove { from{left:-4px} to{left:100%} }
.highlight-src { background: #EEEDFE; border-radius: 3px; animation: hlFlash 0.4s ease; }
@keyframes hlFlash { 0%{background:#EEEDFE} 50%{background:#AFA9EC} 100%{background:#EEEDFE} }
.opt-compare { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 12px; }
.opt-box { border-radius: 8px; padding: 12px; }
.opt-before { background: #FAECE7; border: 0.5px solid #F5C4B3; }
.opt-after { background: #EAF3DE; border: 0.5px solid #C0DD97; }
.opt-label { font-size: 10px; text-transform: uppercase; letter-spacing: 0.06em; margin-bottom: 6px; font-weight: 500; }
.opt-before .opt-label { color: #4A1B0C; }
.opt-after .opt-label { color: #173404; }
.opt-code { font-family: var(--font-mono); font-size: 12px; }
.opt-before .opt-code { color: #4A1B0C; }
.opt-after .opt-code { color: #173404; }
.arrow-center { text-align: center; font-size: 18px; color: #534AB7; margin: 4px 0; }
</style>

<div id="app">
  <h2 class="sr-only" style="position:absolute;width:1px;height:1px;overflow:hidden;clip:rect(0,0,0,0)">Interactive compiler phase visualization showing how source code transforms through 6 phases to machine code</h2>
  <p class="title">Compiler Visualization</p>
  <p class="subtitle">From source code to machine code — step by step</p>

  <div class="input-card">
    <div class="input-label">Source code</div>
    <div class="scan-anim" id="scan-wrap">
      <textarea id="code-input" spellcheck="false">int a = 5 + 3;</textarea>
    </div>
  </div>

  <div class="pipeline" id="pipeline"></div>
  <div class="progress-bar-wrap"><div class="progress-bar-fill" id="prog-fill" style="width:0%"></div></div>

  <div class="phase-card" id="phase-card">
    <div id="phase-content"></div>
  </div>

  <div class="controls">
    <button class="btn-reset" id="btn-reset" onclick="resetAll()">Reset</button>
    <button class="btn-primary" id="btn-next" onclick="nextPhase()">Start Compilation</button>
    <span class="phase-tag" id="phase-tag"></span>
  </div>
</div>

<script>
const PHASES = [
  {
    icon: '🔤',
    color: '#EEEDFE',
    iconColor: '#534AB7',
    name: 'Lexical Analysis',
    short: 'Lexical',
    desc: 'Breaks source code into smallest meaningful units called tokens'
  },
  {
    icon: '🌲',
    color: '#E1F5EE',
    iconColor: '#0F6E56',
    name: 'Syntax Analysis',
    short: 'Syntax',
    desc: 'Checks grammar rules and builds a parse tree (AST)'
  },
  {
    icon: '🔍',
    color: '#FAEEDA',
    iconColor: '#854F0B',
    name: 'Semantic Analysis',
    short: 'Semantic',
    desc: 'Validates meaning — type checks, scope resolution, declarations'
  },
  {
    icon: '⚙️',
    color: '#E6F1FB',
    iconColor: '#185FA5',
    name: 'Intermediate Code',
    short: 'IR Code',
    desc: 'Converts to a platform-independent intermediate representation'
  },
  {
    icon: '⚡',
    color: '#EAF3DE',
    iconColor: '#3B6D11',
    name: 'Code Optimization',
    short: 'Optimize',
    desc: 'Simplifies and improves the intermediate code for efficiency'
  },
  {
    icon: '💻',
    color: '#FAECE7',
    iconColor: '#993C1D',
    name: 'Code Generation',
    short: 'Code Gen',
    desc: 'Produces final machine-level assembly/pseudo-machine instructions'
  }
];

let currentPhase = -1;

function buildPipeline() {
  const wrap = document.getElementById('pipeline');
  wrap.innerHTML = '';
  PHASES.forEach((p, i) => {
    const pill = document.createElement('div');
    pill.className = 'phase-pill pending';
    pill.id = 'pill-' + i;
    pill.title = p.desc;
    pill.innerHTML = `<div class="dot" id="dot-${i}">${i+1}</div><div class="plabel">${p.short}</div>`;
    pill.onclick = () => jumpTo(i);
    wrap.appendChild(pill);
    if (i < PHASES.length - 1) {
      const conn = document.createElement('div');
      conn.className = 'connector';
      conn.id = 'conn-' + i;
      wrap.appendChild(conn);
    }
  });
}

function updatePipeline() {
  PHASES.forEach((_, i) => {
    const pill = document.getElementById('pill-' + i);
    pill.className = 'phase-pill ' + (i < currentPhase ? 'done' : i === currentPhase ? 'active' : 'pending');
    const dot = document.getElementById('dot-' + i);
    dot.textContent = i < currentPhase ? '✓' : i + 1;
    if (i < PHASES.length - 1) {
      document.getElementById('conn-' + i).className = 'connector' + (i < currentPhase ? ' lit' : '');
    }
  });
  const pct = currentPhase < 0 ? 0 : ((currentPhase + 1) / PHASES.length * 100);
  document.getElementById('prog-fill').style.width = pct + '%';
  const tag = document.getElementById('phase-tag');
  tag.textContent = currentPhase >= 0 ? `Phase ${currentPhase + 1} of ${PHASES.length}` : '';
  const btn = document.getElementById('btn-next');
  btn.textContent = currentPhase < 0 ? 'Start Compilation' : currentPhase >= PHASES.length - 1 ? 'Complete ✓' : 'Next Phase →';
  btn.disabled = currentPhase >= PHASES.length - 1;
}

function jumpTo(i) {
  if (i > currentPhase + 1) return;
  currentPhase = i;
  updatePipeline();
  renderPhase(currentPhase);
}

function nextPhase() {
  if (currentPhase >= PHASES.length - 1) return;
  currentPhase++;
  updatePipeline();
  renderPhase(currentPhase);
}

function resetAll() {
  currentPhase = -1;
  updatePipeline();
  document.getElementById('phase-content').innerHTML = getWelcomeHTML();
  document.getElementById('code-input').value = 'int a = 5 + 3;';
}

function getWelcomeHTML() {
  return `<div style="padding:40px 20px;text-align:center;color:var(--color-text-secondary)">
    <div style="font-size:40px;margin-bottom:12px">⚙️</div>
    <div style="font-size:15px;font-weight:500;color:var(--color-text-primary);margin-bottom:8px">Ready to compile</div>
    <div style="font-size:13px;line-height:1.6">Enter your code above, then click <strong>Start Compilation</strong><br>to walk through each phase of the compiler.</div>
  </div>`;
}

function getCode() {
  return document.getElementById('code-input').value.trim() || 'int a = 5 + 3;';
}

function tokenize(code) {
  const tokens = [];
  const patterns = [
    { rx: /^(int|float|char|double|void|return|if|else|while)\b/, type: 'kw', label: 'Keyword' },
    { rx: /^[a-zA-Z_][a-zA-Z0-9_]*/, type: 'id', label: 'Identifier' },
    { rx: /^[0-9]+(\.[0-9]+)?/, type: 'num', label: 'Literal' },
    { rx: /^[+\-*\/=<>!&|]+/, type: 'op', label: 'Operator' },
    { rx: /^[;,(){}[\]]/, type: 'punct', label: 'Punctuation' },
    { rx: /^\s+/, type: 'ws', label: 'Whitespace' },
  ];
  let s = code;
  while (s.length > 0) {
    let matched = false;
    for (const p of patterns) {
      const m = s.match(p.rx);
      if (m) {
        if (p.type !== 'ws') tokens.push({ val: m[0], type: p.type, label: p.label });
        s = s.slice(m[0].length);
        matched = true;
        break;
      }
    }
    if (!matched) { s = s.slice(1); }
  }
  return tokens;
}

function renderPhase(n) {
  const code = getCode();
  const tokens = tokenize(code);
  const ph = PHASES[n];

  let html = `<div class="phase-header">
    <div class="phase-icon" style="background:${ph.color}">${ph.icon}</div>
    <div class="phase-title-wrap">
      <div class="phase-num">Phase ${n+1} of ${PHASES.length}</div>
      <div class="phase-name">${ph.name}</div>
      <div class="phase-desc">${ph.desc}</div>
    </div>
  </div><div class="phase-body vis-area">`;

  if (n === 0) html += renderLexical(code, tokens);
  else if (n === 1) html += renderSyntax(tokens);
  else if (n === 2) html += renderSemantic(tokens);
  else if (n === 3) html += renderIR(tokens);
  else if (n === 4) html += renderOpt(tokens);
  else if (n === 5) html += renderCodeGen(tokens);

  html += '</div>';
  document.getElementById('phase-content').innerHTML = html;

  if (n === 0) {
    const wrap = document.getElementById('scan-wrap');
    const sl = document.createElement('div');
    sl.className = 'scan-line';
    wrap.appendChild(sl);
    setTimeout(() => sl.remove(), 1500);
  }
}

function renderLexical(code, tokens) {
  const classMap = { kw: 'tok-kw', id: 'tok-id', op: 'tok-op', num: 'tok-num', punct: 'tok-punct' };
  let tokHTML = tokens.map((t, i) =>
    `<div style="display:flex;flex-direction:column;align-items:center;animation-delay:${i * 0.08}s">
      <div class="token ${classMap[t.type]}" style="animation-delay:${i * 0.08}s">${escHtml(t.val)}</div>
      <div class="tok-label">${t.label}</div>
    </div>`
  ).join('');

  const legend = [
    ['tok-kw', 'Keyword'],
    ['tok-id', 'Identifier'],
    ['tok-op', 'Operator'],
    ['tok-num', 'Literal'],
    ['tok-punct', 'Punctuation'],
  ].map(([c, l]) => `<span class="token ${c}" style="font-size:11px;padding:3px 8px">${l}</span>`).join('');

  return `<div class="tooltip-row">The lexer reads source characters left-to-right, groups them into tokens, and classifies each one by type.</div>
  <div style="font-size:11px;color:var(--color-text-secondary);margin-bottom:8px">Source: <code style="background:#F1EFE8;padding:2px 6px;border-radius:4px;font-size:12px">${escHtml(code)}</code></div>
  <div style="font-size:11px;color:var(--color-text-secondary);margin-bottom:10px">↓ Scanning character by character…</div>
  <div class="token-row" style="margin-bottom:16px">${tokHTML}</div>
  <div style="font-size:11px;color:var(--color-text-secondary);margin-bottom:6px">Token types legend:</div>
  <div style="display:flex;flex-wrap:wrap;gap:6px">${legend}</div>
  <div style="margin-top:14px;font-size:12px;color:var(--color-text-secondary)">Total tokens identified: <strong>${tokens.length}</strong></div>`;
}

function renderSyntax(tokens) {
  const hasMath = tokens.some(t => t.type === 'op');
  const varName = tokens.find(t => t.type === 'id')?.val || 'a';
  const nums = tokens.filter(t => t.type === 'num').map(t => t.val);
  const ops = tokens.filter(t => t.type === 'op' && t.val !== '=').map(t => t.val);
  const kwNode = tokens.find(t => t.type === 'kw')?.val || 'int';

  const lhs = `<div class="tree-child"><div class="tree-box" style="animation-delay:0.1s">Declaration</div><div class="tree-v-line"></div><div style="display:flex;gap:16px"><div class="tree-child"><div class="tree-box tok-kw" style="animation-delay:0.2s">${escHtml(kwNode)}</div></div><div class="tree-child"><div class="tree-box tok-id" style="animation-delay:0.3s">${escHtml(varName)}</div></div></div></div>`;

  let rhs;
  if (nums.length >= 2 && ops.length >= 1) {
    rhs = `<div class="tree-child"><div class="tree-box" style="animation-delay:0.15s">BinaryExpr</div><div class="tree-v-line"></div><div style="display:flex;gap:12px"><div class="tree-child"><div class="tree-box tok-num" style="animation-delay:0.25s">${escHtml(nums[0])}</div></div><div class="tree-child"><div class="tree-box tok-op" style="animation-delay:0.3s">${escHtml(ops[0])}</div></div><div class="tree-child"><div class="tree-box tok-num" style="animation-delay:0.35s">${escHtml(nums[1])}</div></div></div></div>`;
  } else {
    const rval = nums[0] || tokens.find(t => t.type !== 'kw' && t.type !== 'id' && t.type !== 'op' && t.type !== 'punct')?.val || '?';
    rhs = `<div class="tree-child"><div class="tree-box tok-num" style="animation-delay:0.25s">${escHtml(rval)}</div></div>`;
  }

  return `<div class="tooltip-row">The parser checks if the token stream follows the grammar rules of the language and builds an Abstract Syntax Tree (AST).</div>
  <div style="text-align:center">
    <div class="tree-node">
      <div class="tree-box" style="background:#534AB7;color:#fff;border-color:#534AB7;animation-delay:0s">AssignStatement</div>
      <div class="tree-v-line"></div>
      <div class="tree-branch">
        ${lhs}
        <div class="tree-child"><div class="tree-box tok-op" style="animation-delay:0.08s">=</div></div>
        ${rhs}
      </div>
    </div>
  </div>
  <div style="margin-top:16px;font-size:12px;color:var(--color-text-secondary)">Grammar rule matched: <code style="background:#F1EFE8;padding:2px 6px;border-radius:4px">declaration → type id = expr ;</code></div>`;
}

function renderSemantic(tokens) {
  const kwTok = tokens.find(t => t.type === 'kw');
  const idTok = tokens.find(t => t.type === 'id');
  const numToks = tokens.filter(t => t.type === 'num');
  const opToks = tokens.filter(t => t.type === 'op' && t.val !== '=');

  const varName = idTok?.val || 'a';
  const kwName = kwTok?.val || 'int';
  const n1 = numToks[0]?.val || '5';
  const n2 = numToks[1]?.val || '3';
  const op = opToks[0]?.val || '+';

  const checks = [
    { ok: !!kwTok, msg: `Type declared: <code>${kwName}</code> — valid built-in type` },
    { ok: !!idTok, msg: `Variable <code>${varName}</code> declared before use — scope OK` },
    { ok: numToks.length > 0, msg: `Literals <code>${n1}</code>${n2?`, <code>${n2}</code>`:''} are compatible with <code>${kwName}</code>` },
    { ok: true, msg: `Operator <code>${op}</code> is valid for numeric operands` },
    { ok: true, msg: `Assignment type matches: right-hand side evaluates to <code>${kwName}</code>` },
  ];

  const allOk = checks.every(c => c.ok);
  const rows = checks.map((c, i) =>
    `<div class="semantic-row" style="animation:fadeSlide 0.3s ease ${i*0.1}s backwards">
      <div class="sem-check sem-ok">${c.ok ? '✓' : '✗'}</div>
      <div style="font-size:13px;color:var(--color-text-primary)">${c.msg}</div>
    </div>`
  ).join('');

  const symTable = `<div style="margin-top:16px">
    <div style="font-size:11px;color:var(--color-text-secondary);margin-bottom:8px;text-transform:uppercase;letter-spacing:0.05em">Symbol table</div>
    <div style="background:#faf9f6;border:0.5px solid var(--color-border-tertiary);border-radius:8px;overflow:hidden">
      <div style="display:grid;grid-template-columns:1fr 1fr 1fr 1fr;font-size:11px;color:var(--color-text-secondary);padding:8px 12px;border-bottom:0.5px solid var(--color-border-tertiary);background:#F1EFE8">
        <span>Name</span><span>Type</span><span>Scope</span><span>Value</span>
      </div>
      <div style="display:grid;grid-template-columns:1fr 1fr 1fr 1fr;font-size:12px;font-family:var(--font-mono);padding:8px 12px">
        <span>${varName}</span><span>${kwName}</span><span>global</span><span>—</span>
      </div>
    </div>
  </div>`;

  return `<div class="tooltip-row">Semantic analysis ensures the code is meaningful — types match, variables are declared, and operations are valid for the given types.</div>
  ${rows}
  <div style="margin-top:16px"><span class="badge ${allOk ? 'badge-ok' : 'badge-err'}">${allOk ? '✓ Semantic check passed — no errors' : '✗ Semantic error detected'}</span></div>
  ${symTable}`;
}

function renderIR(tokens) {
  const idTok = tokens.find(t => t.type === 'id');
  const numToks = tokens.filter(t => t.type === 'num');
  const opToks = tokens.filter(t => t.type === 'op' && t.val !== '=');

  const varName = idTok?.val || 'a';
  const n1 = numToks[0]?.val || '5';
  const n2 = numToks[1]?.val || '3';
  const op = opToks[0]?.val || '+';
  const opWord = {'+':'ADD','-':'SUB','*':'MUL','/':'DIV'}[op] || 'ADD';

  const lines = [
    { lbl:'t1', expr:`${n1}  ${op}  ${n2}`, comment:'// compute expression into temp' },
    { lbl: varName, expr:'t1', comment:'// assign temp to variable' },
  ];

  const threeAddr = lines.map((l, i) =>
    `<div class="code-line" style="animation-delay:${i*0.15}s">
      <span class="line-num">${i+1}</span>
      <span><span class="hl-var">${l.lbl}</span> <span class="hl-op">=</span> <span>${escHtml(l.expr)}</span></span>
      <span style="margin-left:auto;font-size:11px;color:var(--color-text-secondary)">${l.comment}</span>
    </div>`
  ).join('');

  const tacNote = `<div style="margin-top:14px;font-size:12px;color:var(--color-text-secondary)">
    Three-Address Code (TAC) format: <code style="background:#F1EFE8;padding:2px 6px;border-radius:4px">result = operand1 op operand2</code>
    <br>Temporary variables (t1, t2…) hold intermediate results — platform-independent.
  </div>`;

  return `<div class="tooltip-row">The compiler translates the AST into Three-Address Code (TAC), a simple intermediate representation that is easy to optimize and translate to any architecture.</div>
  <div class="code-block">${threeAddr}</div>
  ${tacNote}
  <div style="margin-top:16px;background:#E6F1FB;border-radius:8px;padding:12px;font-size:12px;color:#0C447C">
    IR is platform-independent — the same IR can be used to generate code for x86, ARM, or any other CPU.
  </div>`;
}

function renderOpt(tokens) {
  const idTok = tokens.find(t => t.type === 'id');
  const numToks = tokens.filter(t => t.type === 'num');
  const opToks = tokens.filter(t => t.type === 'op' && t.val !== '=');

  const varName = idTok?.val || 'a';
  const n1 = parseFloat(numToks[0]?.val) || 5;
  const n2 = parseFloat(numToks[1]?.val) || 3;
  const op = opToks[0]?.val || '+';
  let result;
  try { result = eval(`${n1}${op}${n2}`); } catch(e) { result = n1 + n2; }
  result = Number.isInteger(result) ? result : result.toFixed(2);

  return `<div class="tooltip-row">The optimizer applies transformations to improve performance and reduce code size. Here, <strong>constant folding</strong> computes the expression at compile time.</div>
  <div style="font-size:12px;color:var(--color-text-secondary);margin-bottom:10px">Optimization applied: <strong>Constant Folding</strong> — expressions with all-constant operands are evaluated at compile time, eliminating the runtime computation.</div>
  <div class="opt-compare">
    <div class="opt-box opt-before">
      <div class="opt-label">Before optimization</div>
      <div class="opt-code">t1 = ${n1} ${escHtml(op)} ${n2}<br>${varName} = t1</div>
    </div>
    <div class="opt-box opt-after">
      <div class="opt-label">After optimization</div>
      <div class="opt-code">${varName} = ${result}</div>
    </div>
  </div>
  <div class="arrow-center">↓</div>
  <div style="font-size:12px;color:var(--color-text-secondary);margin-bottom:14px">Result: temporary variable <code>t1</code> eliminated, expression pre-computed to <strong>${result}</strong></div>
  <div style="background:#EAF3DE;border-radius:8px;padding:12px;font-size:12px;color:#173404">
    <strong>Other common optimizations:</strong> Dead code elimination, loop unrolling, common subexpression elimination, inlining, register allocation hints.
  </div>`;
}

function renderCodeGen(tokens) {
  const idTok = tokens.find(t => t.type === 'id');
  const numToks = tokens.filter(t => t.type === 'num');
  const opToks = tokens.filter(t => t.type === 'op' && t.val !== '=');

  const varName = idTok?.val || 'a';
  const n1 = numToks[0]?.val || '5';
  const n2 = numToks[1]?.val || '3';
  const op = opToks[0]?.val || '+';
  let result;
  try { result = eval(`${n1}${op}${n2}`); } catch(e) { result = Number(n1) + Number(n2); }
  result = Number.isInteger(result) ? result : result.toFixed(2);

  const opInstr = {'+':'ADD','-':'SUB','*':'MUL','/':'DIV'}[op] || 'ADD';

  const instrs = [
    { i:'MOV', a:`R1, ${n1}`, c:'load first operand into R1' },
    { i:opInstr, a:`R1, ${n2}`, c:`${op} second operand into R1` },
    { i:'STORE', a:`R1, [${varName}]`, c:`store result to memory location '${varName}'` },
  ];

  const asmLines = instrs.map((l, i) =>
    `<div class="asm-line" style="animation-delay:${i*0.15}s">
      <span class="line-num">${i+1}</span>
      <span class="asm-instr">${l.i}</span>
      <span class="asm-args">${escHtml(l.a)}</span>
      <span class="asm-comment">; ${l.c}</span>
    </div>`
  ).join('');

  return `<div class="tooltip-row">Code generation maps the optimized IR to actual machine instructions. Registers are assigned, memory addresses resolved, and assembly-level code is produced.</div>
  <div style="font-size:11px;color:var(--color-text-secondary);margin-bottom:8px;text-transform:uppercase;letter-spacing:0.05em">Pseudo-assembly output</div>
  <div class="code-block">${asmLines}</div>
  <div class="reg-viz">
    <div class="reg-box"><div class="reg-name">R1 (register)</div><div class="reg-val">${result}</div></div>
    <div class="reg-box"><div class="reg-name">mem[${varName}]</div><div class="reg-val">${result}</div></div>
  </div>
  <div style="margin-top:16px;background:#FAECE7;border-radius:8px;padding:12px;font-size:12px;color:#4A1B0C">
    <strong>Compilation complete!</strong> The variable <code>${varName}</code> now holds <code>${result}</code> in memory. The CPU will execute these instructions sequentially.
  </div>`;
}

function escHtml(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

buildPipeline();
updatePipeline();
document.getElementById('phase-content').innerHTML = getWelcomeHTML();
</script>
